<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<!-- Favicon -->
	<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
	<link rel="icon" type="image/x-icon" href="favicon.ico">

	<title>Internship 2026 Demo | Venus Choi</title>

	<!-- Open Graph / WhatsApp Preview -->
	<meta property="og:title" content="Internship 2026 Demo - Venus Choi" />
	<meta property="og:description" content="A clean and professional demo website built during my 2026 internship. Showcasing web development and design skills." />
	<meta property="og:url" content="https://venus-ht-choi.github.io/Internship_2026/" />
	<meta property="og:type" content="website" />

	<!-- Optional: Twitter Card -->
	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:title" content="Internship 2026 Demo - Venus Choi" />
	<meta name="twitter:description" content="A clean and professional demo website built during my 2026 internship." />
	<link rel="stylesheet" href="style.css" />
</head>
<body>
	<div class="page">
		<header class="site-header">
			<div class="container nav">
				<a class="brand" href="#top" aria-label="Internship 2026 Demo">
					<span class="brand-mark" id="brand-mark">L</span>
					<span id="brand-name">Internship 2026 Demo</span>
				</a>
			</div>
		</header>

		<main id="top">
			<section class="hero">
				<div class="container hero-grid">
					<div>
						<div class="eyebrow reveal" id="hero-eyebrow"></div>
						<h1 class="reveal delay-1" id="hero-heading"></h1>
						<p class="hero-copy reveal delay-2" id="hero-copy"></p>
						<div class="hero-actions reveal delay-3">
							<a class="button button-primary" href="#features" id="primary-btn"></a>
							<a class="button button-secondary" href="#contact" id="secondary-btn"></a>
						</div>
						<div class="trust-row reveal delay-3" id="trust-row"></div>
					</div>
				</div>
			</section>

			<section class="features" id="features">
				<div class="container">
					<div class="section-heading reveal">
						<h2 id="features-heading"></h2>
						<p id="features-subheading"></p>
					</div>
					<div class="feature-grid" id="feature-grid"></div>
				</div>
			</section>

			<section class="story" id="story">
				<div class="container story-panel reveal">
					<div class="story-copy">
						<div class="eyebrow" id="story-eyebrow" style="margin-bottom: 16px;"></div>
						<h2 id="story-heading"></h2>
						<p id="story-copy"></p>
						<div class="stats" id="stats-grid"></div>
					</div>
				</div>
			</section>

			<section class="contact" id="contact">
				<div class="container contact-card reveal">
					<div>
						<div class="eyebrow" id="contact-eyebrow" style="margin-bottom: 16px;"></div>
						<h2 id="contact-heading"></h2>
						<p id="contact-copy"></p>
						<div class="mailbox">
							<a href="#" id="contact-email"></a>
						</div>
					</div>
				</div>

				<div class="container footer-meta">
					<div>© <span data-current-year>2026</span> T. All rights reserved.</div>
					<div>
						<a href="#">Privacy Policy</a> ・ <a href="#">Terms of Service</a>
					</div>
				</div>
			</section>
		</main>
	</div>

	<script src="content.js" type="module"></script>
	<script src="script.js" type="module"></script>
</body>
</html>
